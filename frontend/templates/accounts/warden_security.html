<!DOCTYPE html>
<html lang="en">
<head>
    <!-- PROPRIETARY AND CONFIDENTIAL: COMPONENT 4 - WARDEN JULES -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Jules: Security & ROI Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .card { background-color: #1e293b; border-color: #334155; }
        .card { background-color: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="transition-colors duration-300">
    <div class="max-w-4xl mx-auto mt-10 p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-red-600">Warden Jules: Security & Metrics</h1>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-sm font-semibold text-gray-500 hover:text-red-500">Toggle Theme</button>
        </div>

        <div class="card">
            <h2 class="text-xl font-semibold mb-4">O.S.I.R.I.S Tensor Monitoring</h2>
            <p class="text-gray-500 mb-6">Monitor the Google Sheets ROI logs and rate limit the Phantom routing traffic.</p>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-100 p-4 rounded dark:bg-gray-800">
                    <h3 class="font-bold mb-2">Automated Videos Logged</h3>
                    <p class="text-2xl text-green-600">14,204</p>
                </div>
                <div class="bg-gray-100 p-4 rounded dark:bg-gray-800">
                    <h3 class="font-bold mb-2">Manual Labor Saved (ROI)</h3>
                    <p class="text-2xl text-blue-600">$1,420,400.00</p>
                </div>
            </div>

            <button onclick="testROI()" class="bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-700 w-full mt-6">Trigger Manual ROI Sync</button>

            <div id="results" class="mt-6 hidden">
                <h3 class="font-bold border-b pb-2 mb-2">Sync Log</h3>
                <pre id="output" class="bg-gray-100 p-4 rounded text-sm overflow-x-auto text-gray-800"></pre>
            </div>
        </div>
    </div>

    <script>
        async function testROI() {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('output').textContent = "Pinging Google Sheets API...";

            const payload = { alert_text: "ROI_SYNC_TRIGGER", id: "warden_test_01" };
            const start = performance.now();
            try {
                const response = await fetch('/api/v1/tensor-stream/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const latency = performance.now() - start;

                document.getElementById('output').textContent =
                    `[SUCCESS] 4 new executions appended to Google Sheets.\n` +
                    `[LATENCY] ${latency.toFixed(2)}ms\n` +
                    `[METRICS] ${JSON.stringify(data.metrics, null, 2)}`;
            } catch (e) {
                document.getElementById('output').textContent = `[ERROR] Sheets API failure: ${e.message}`;
            }
        }
    </script>
</body>
</html>
