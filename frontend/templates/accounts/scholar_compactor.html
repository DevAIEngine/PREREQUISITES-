<!DOCTYPE html>
<html lang="en">
<head>
    <!-- PROPRIETARY AND CONFIDENTIAL: COMPONENT 3 - SCHOLAR JULES -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Jules: Offline Compactor Thresholds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .card { background-color: #1e293b; border-color: #334155; }
        .card { background-color: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="transition-colors duration-300">
    <div class="max-w-4xl mx-auto mt-10 p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-green-600">Scholar Jules: Offline Compactor</h1>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-sm font-semibold text-gray-500 hover:text-green-500">Toggle Theme</button>
        </div>

        <div class="card">
            <h2 class="text-xl font-semibold mb-4">Deep-Fetch Web Scraping</h2>
            <p class="text-gray-500 mb-6">Test the system's ability to serialize 50-100 external hyperlinks before the grid goes down.</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Raw Chat Export (Hyperlinks)</label>
                    <textarea id="chat_links" rows="6" class="w-full border rounded p-2 text-gray-900">https://medical-journals.org/triage
https://nasa.gov/orbital-mechanics
https://wikipedia.org/wiki/physics</textarea>
                </div>

                <button onclick="testCompaction()" class="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700 w-full mt-4">Start Mini Machine Extraction</button>
            </div>

            <div id="results" class="mt-6 hidden">
                <h3 class="font-bold border-b pb-2 mb-2">Serialization Log</h3>
                <pre id="output" class="bg-gray-100 p-4 rounded text-sm overflow-x-auto text-gray-800"></pre>
            </div>
        </div>
    </div>

    <script>
        async function testCompaction() {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('output').textContent = "Deep-Fetching 3 Sources...";

            const payload = { alert_text: "COMPACTION_TEST", urls: document.getElementById('chat_links').value.split('\n') };
            const start = performance.now();
            try {
                const response = await fetch('/api/v1/tensor-stream/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const latency = performance.now() - start;

                document.getElementById('output').textContent =
                    `[SUCCESS] Sources scraped and serialized.\n` +
                    `[LATENCY] ${latency.toFixed(2)}ms\n` +
                    `[MINI MACHINE] Ready for offline transfer.`;
            } catch (e) {
                document.getElementById('output').textContent = `[ERROR] Compactor timeout: ${e.message}`;
            }
        }
    </script>
</body>
</html>
